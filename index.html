<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#0a0a0f"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Growth"/>
<title>Personal Growth</title>
<link rel="manifest" href="/manifest.json"/>
<style>
:root{--bg:#0a0a0f;--bg2:#111118;--bg3:#18181f;--border:#1e1e2a;--txt:#e8e8f0;--txt2:#888;--txt3:#444;--blue:#4f8eff;--purple:#8b5cf6;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--grad:linear-gradient(135deg,#4f8eff,#8b5cf6);--r:14px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--txt);overscroll-behavior:none}
::-webkit-scrollbar{display:none}
input,textarea,select,button{font-family:inherit;color:var(--txt)}
#app{display:flex;flex-direction:column;height:100vh;max-width:430px;margin:0 auto}
.hdr{background:var(--bg);padding:calc(env(safe-area-inset-top,0px) + 14px) 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.hdr-date{font-size:9px;letter-spacing:3px;color:var(--blue);text-transform:uppercase;margin-bottom:2px}
.hdr-title{font-size:20px;font-weight:800;letter-spacing:-0.5px}
.gtext{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-sub{font-size:10px;color:var(--txt3);margin-top:1px}
.nbtn{width:36px;height:36px;border-radius:12px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}
.prog-wrap{margin-top:10px}
.prog-row{display:flex;justify-content:space-between;font-size:9px;color:var(--txt3);margin-bottom:4px}
.prog-track{height:2px;background:var(--bg3);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--grad);border-radius:2px;transition:width .5s}
.bnav{background:var(--bg2);border-top:1px solid var(--border);display:flex;padding:6px 2px calc(env(safe-area-inset-bottom,0px)+6px);flex-shrink:0;overflow-x:auto;gap:2px}
.bnav::-webkit-scrollbar{display:none}
.nbv{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 10px;border:none;background:none;border-radius:10px;cursor:pointer;min-width:50px}
.nbv .bi{font-size:18px;line-height:1}
.nbv .bl{font-size:8px;font-weight:600;color:var(--txt3);letter-spacing:.5px;text-transform:uppercase}
.nbv.on{background:var(--bg3)}
.nbv.on .bl{color:var(--blue)}
.scr{flex:1;overflow-y:auto;padding:14px 14px 20px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.cardd{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.slbl{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--txt3);text-transform:uppercase;margin-bottom:10px}
.inp{width:100%;padding:11px 13px;background:var(--bg);border:1px solid var(--border);border-radius:10px;font-size:13px;color:var(--txt);outline:none}
.inp:focus{border-color:var(--blue)}
.inp::placeholder{color:var(--txt3)}
textarea.inp{resize:vertical;min-height:72px;line-height:1.5}
.btn-g{background:var(--grad);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer}
.pill{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--txt3);font-size:11px;font-weight:600;cursor:pointer}
.pill.on{background:#4f8eff22;border-color:var(--blue);color:var(--blue)}
.ci{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:6px;cursor:pointer;user-select:none}
.ci.done{background:#0d1f0d;border-color:#1a3a1a}
.ci.done .cil{color:var(--txt3);text-decoration:line-through}
.cic{width:20px;height:20px;border-radius:8px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ci.done .cic{background:var(--green);border-color:var(--green)}
.cil{flex:1;font-size:13px;font-weight:500}
.cit{font-size:9px;color:var(--txt3)}
.hgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.hcard{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 10px;text-align:center;cursor:pointer;user-select:none}
.hcard.done{background:#0a1f0a;border-color:#22c55e66}
.chip{display:inline-flex;padding:6px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--border);background:var(--bg);color:var(--txt3);cursor:pointer;margin:3px}
.chip.done{background:#4f8eff22;border-color:var(--blue);color:var(--blue)}
.gbar{flex:1;height:4px;background:var(--bg3);border-radius:3px;overflow:hidden}
.gbarf{height:100%;background:var(--grad);border-radius:3px;transition:width .3s}
.gbtn{width:32px;height:32px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);color:var(--txt2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sbox{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center}
.erow{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:6px}
.vrow{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;margin-bottom:6px}
.vnum{width:26px;height:26px;border-radius:8px;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.wrow{display:flex;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border)}
.wrow:last-child{border-bottom:none}
.wd{width:18px;height:18px;border-radius:5px;background:var(--bg3)}
.wd.done{background:var(--green)}
.mchk{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:10px;text-align:center;cursor:pointer}
.mchk.done{border-color:var(--purple)}
.rdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.phase-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:9px;cursor:pointer}
.phase-card.active{border-color:var(--blue)}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 20px;border-radius:20px;font-size:12px;font-weight:700;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.npanel{position:fixed;top:0;left:0;right:0;bottom:0;background:#000b;z-index:100;display:none;align-items:flex-end;max-width:430px;margin:0 auto}
.npanel.show{display:flex}
.nsheet{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px;width:100%;border-top:1px solid var(--border);max-height:80vh;overflow-y:auto}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.scr{animation:fadeUp .2s ease}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-row">
      <div>
        <div class="hdr-date" id="hdate"></div>
        <div class="hdr-title"><span class="gtext">Personal</span> Growth</div>
        <div class="hdr-sub" id="hsub">90-Day Mission</div>
      </div>
      <button class="nbtn" onclick="toggleNP()" id="nbtn">🔔</button>
    </div>
    <div class="prog-wrap">
      <div class="prog-row"><span>Today's Schedule</span><span id="pct">0%</span></div>
      <div class="prog-track"><div class="prog-fill" id="pfill" style="width:0"></div></div>
    </div>
  </div>
  <div class="scr" id="scr"></div>
  <div class="bnav" id="bnav"></div>
</div>

<div class="npanel" id="npanel" onclick="if(event.target===this)toggleNP()">
  <div class="nsheet">
    <div style="font-size:16px;font-weight:700;margin-bottom:4px">🔔 Notifications</div>
    <div style="font-size:11px;color:var(--txt3);margin-bottom:14px">Daily reminders for your 90-day mission</div>
    <div id="nstatus" style="background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:14px;font-size:12px"></div>
    <div id="ntimes"></div>
    <button class="btn-g" style="width:100%;margin-top:10px;border-radius:10px" onclick="reqNotif()">🔔 Enable Notifications</button>
    <button onclick="toggleNP()" style="width:100%;margin-top:8px;padding:10px;background:none;border:1px solid var(--border);border-radius:10px;color:var(--txt3);cursor:pointer">Close</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── STORAGE
var KEY="pgv4";
function load(){try{return JSON.parse(localStorage.getItem(KEY)||"{}");}catch(e){return{};}}
function save(d){try{localStorage.setItem(KEY,JSON.stringify(d));}catch(e){alert("Storage full!");} return d;}
var DB=load();
function tday(){return new Date().toISOString().split("T")[0];}
function mkey(){var d=new Date();return d.getFullYear()+"-"+d.getMonth();}
function wdays(){var a=[],t=new Date();for(var i=6;i>=0;i--){var d=new Date(t);d.setDate(t.getDate()-i);a.push(d.toISOString().split("T")[0]);}return a;}
function dltr(ds){return["Su","Mo","Tu","We","Th","Fr","Sa"][new Date(ds).getDay()];}
function fmtR(n){return"₹"+Number(n||0).toLocaleString("en-IN");}
function escH(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function toast(msg,c){var e=document.getElementById("toast");e.textContent=msg;e.style.background=c||"var(--green)";e.classList.add("show");setTimeout(function(){e.classList.remove("show");},2500);}

// ── CONSTANTS
var SCH={
  morning:[{id:"wake",t:"6:15 AM",l:"Wake up + Water + Freshen up"},{id:"gym",t:"6:30–7:30",l:"Gym 💪"},{id:"sun",t:"7:30–7:40",l:"Sunlight ☀️"},{id:"whey",t:"7:45",l:"Whey + Banana 🍌"},{id:"bfast",t:"8:15",l:"Breakfast 🍳"},{id:"leave",t:"8:45",l:"Leave for Job 🏢"}],
  day:[{id:"fruit",t:"11:00",l:"Fruit + Peanuts 🥜"},{id:"lunch",t:"1:00 PM",l:"Lunch 🍛"},{id:"snack",t:"5:30 PM",l:"Evening Snack"}],
  night:[{id:"dinner",t:"9:00–9:30",l:"Dinner + Family 🏠"},{id:"dsas",t:"9:30–10:15",l:"DSA Practice 💻"},{id:"bks",t:"10:15–10:25",l:"Break ☕"},{id:"dev",t:"10:25–11:05",l:"Dev / Project 🛠️"},{id:"recap",t:"11:05–11:15",l:"Recap + GitHub ✅"},{id:"slp",t:"11:30 PM",l:"Sleep 😴"}]
};
var HBTS=[{id:"gym_h",l:"Gym",ic:"🏋️"},{id:"slp_h",l:"Sleep",ic:"😴"},{id:"dsa_h",l:"DSA",ic:"🧠"},{id:"dev_h",l:"Dev",ic:"💻"},{id:"git_h",l:"GitHub",ic:"🐙"},{id:"wtr_h",l:"Water",ic:"💧"}];
var DSA_T=["Arrays","Strings","Linked List","Stack","Queue","Binary Search","Recursion","Sorting","Hashing","Trees","BST","Graphs","DP","Greedy","Backtracking"];
var ECATS=["Food","Transport","Shopping","Health","Other"];
var NICHES=["Coding Journey (DSA + Build in Public)","Self Improvement for Working Guys","Finance + Responsibility Mindset"];
var CTASKS=[{d:"Mon",t:"Video idea 💡"},{d:"Tue",t:"Script likhna 📝"},{d:"Thu",t:"Record karo 🎥"},{d:"Sat",t:"Edit + Upload ✂️"}];
var DRULES=["Phone 11:15 PM ke baad band 📵","No random spending 💸","No skip gym 2 days 🏋️","Sunday review mandatory 📅"];
var HPHASES=[
  {p:"Phase 1",y:"2026",c:"var(--green)",l:"Foundation Year",g:["Emergency fund ₹1.5L","Income growth plan","Expense control"],n:"No home saving yet. Pehle neev."},
  {p:"Phase 2",y:"2027",c:"var(--amber)",l:"Income Growth Year",g:["Salary 40–50K target","EMI capacity check","Down payment ₹10K+/mo"],n:"Ghar ke layak banna shuru."},
  {p:"Phase 3",y:"2028–29",c:"var(--purple)",l:"Action Year",g:["Down payment ₹5–8L ready","EMI < 30% income","Emergency fund untouched"],n:"Tab ghar realistic hoga. ✅"}
];
var TABS=[{id:"Schedule",ic:"📅",l:"Sched"},{id:"Habits",ic:"🔥",l:"Habits"},{id:"DSA",ic:"🧠",l:"DSA"},{id:"Goals",ic:"🎯",l:"Goals"},{id:"Weekly",ic:"📊",l:"Weekly"},{id:"Finance",ic:"💰",l:"Finance"},{id:"Home",ic:"🏠",l:"Home"},{id:"Content",ic:"🎥",l:"Content"},{id:"Mind",ic:"🧘",l:"Mind"}];
var MTGT={2:3000,3:7000,4:12000};
var INC=41500;
var FEXP=[{id:"vc1",l:"VC 10.5K",d:10500},{id:"vc2",l:"VC 2K",d:2000},{id:"vc3",l:"VC 1K",d:1000},{id:"lic",l:"LIC",d:0},{id:"sip",l:"SIP",d:0},{id:"gkh",l:"Ghar Kharcha",d:0},{id:"bls",l:"Bills",d:0}];
var NSCHD=[{time:"06:15",title:"🌅 Rise & Shine!",body:"Wake up! Water pi. Gym ke liye ready ho!"},{time:"06:30",title:"💪 Gym Time!",body:"6:30 ho gaya bhai — gym chalte hain!"},{time:"08:45",title:"🏢 Job ke liye niklo!",body:"Office time. Niklo abhi."},{time:"11:00",title:"🥜 Snack time!",body:"Fruit + Peanuts. Energy maintain karo."},{time:"13:00",title:"🍛 Lunch!",body:"Lunch karo. Ek ghante ka break."},{time:"21:30",title:"💻 DSA Time!",body:"9:30 PM — DSA practice. 45 min focus."},{time:"22:25",title:"🛠️ Dev Time!",body:"Project pe kaam karo. 40 min."},{time:"23:05",title:"✅ Recap + GitHub!",body:"Push karo. Aaj ka review. 10 min."},{time:"23:15",title:"📵 Phone band karo!",body:"11:15 ho gaya — phone rakh do bhai."},{time:"23:30",title:"😴 So jao!",body:"Rest zaroori hai. 90-day mission ke liye."}];

// ── STATE
var aTab="Schedule",fSub="Overview",cSub="Overview",mSub="Daily";
var brActive=false,brPhase="inhale",brCount=4,brCyc=0,brTimer=null;

// ── NOTIFICATIONS
function reqNotif(){
  if(!("Notification" in window)){toast("Browser support nahi","var(--red)");return;}
  Notification.requestPermission().then(function(p){
    if(p==="granted"){
      toast("🔔 Notifications ON!");
      schedNotifs();
      document.getElementById("nbtn").textContent="🔔";
    } else {
      toast("Permission denied","var(--red)");
    }
    updNP();
  });
}
function schedNotifs(){
  if(!("Notification" in window)||Notification.permission!=="granted")return;
  var now=new Date();
  NSCHD.forEach(function(n){
    var p=n.time.split(":");
    var t=new Date();
    t.setHours(parseInt(p[0]),parseInt(p[1]),0,0);
    if(t<=now)t.setDate(t.getDate()+1);
    var delay=t-now;
    if(delay>0&&delay<86400000){
      setTimeout(function(ti,bo){
        if(Notification.permission==="granted")
          new Notification(ti,{body:bo,icon:"/icon.png"});
      }.bind(null,n.title,n.body),delay);
    }
  });
}
function updNP(){
  var perm=("Notification" in window)?Notification.permission:"unsupported";
  var el=document.getElementById("nstatus");
  var el2=document.getElementById("ntimes");
  if(!el||!el2)return;
  var msgs={granted:"✅ Notifications ON — roz reminders milenge!",denied:"❌ Denied — Settings mein jaake allow karo",default:"⚠️ Permission abhi nahi di",unsupported:"❌ Browser support nahi"};
  var clrs={granted:"var(--green)",denied:"var(--red)",default:"var(--amber)",unsupported:"var(--red)"};
  el.style.color=clrs[perm];el.textContent=msgs[perm]||"";
  el2.innerHTML="<div class='slbl'>Daily Reminders</div>"+NSCHD.map(function(n){
    return "<div style='display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)'>"+
      "<div style='font-size:9px;color:var(--blue);min-width:40px'>"+n.time+"</div>"+
      "<div><div style='font-size:12px;font-weight:600'>"+n.title+"</div><div style='font-size:10px;color:var(--txt3)'>"+n.body+"</div></div>"+
    "</div>";
  }).join("");
}
function toggleNP(){
  var p=document.getElementById("npanel");
  p.classList.toggle("show");
  if(p.classList.contains("show"))updNP();
}

// ── RENDER
function render(){
  DB=load();
  var today=tday(),td=DB[today]||{};
  var all=[].concat(SCH.morning,SCH.day,SCH.night);
  var done=all.filter(function(i){return td[i.id];}).length;
  var pct=Math.round(done/all.length*100);
  document.getElementById("hdate").textContent=new Date().toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"short"}).toUpperCase();
  document.getElementById("pct").textContent=pct+"%";
  document.getElementById("pfill").style.width=pct+"%";
  var day=dayNum();
  document.getElementById("hsub").textContent=pct===100?"🏆 Aaj ka din complete!":"Day "+day+" of 90 · "+pct+"% done";
  document.getElementById("bnav").innerHTML=TABS.map(function(t){
    return "<button class='nbv"+(t.id===aTab?" on":"")+"' onclick=\"sw('"+t.id+"')\"><span class='bi'>"+t.ic+"</span><span class='bl'>"+t.l+"</span></button>";
  }).join("");
  var h="";
  if(aTab==="Schedule")h=rSch();
  else if(aTab==="Habits")h=rHab();
  else if(aTab==="DSA")h=rDSA();
  else if(aTab==="Goals")h=rGoals();
  else if(aTab==="Weekly")h=rWeekly();
  else if(aTab==="Finance")h=rFin();
  else if(aTab==="Home")h=rHome();
  else if(aTab==="Content")h=rContent();
  else if(aTab==="Mind")h=rMind();
  document.getElementById("scr").innerHTML=h;
}
function dayNum(){
  if(!DB._start){DB._start=tday();save(DB);}
  return Math.min(90,Math.max(1,Math.floor((new Date()-new Date(DB._start))/86400000)+1));
}
function sw(t){aTab=t;fSub="Overview";cSub="Overview";mSub="Daily";render();}
function sfin(s){fSub=s;render();}function scon(s){cSub=s;render();}function smnd(s){mSub=s;render();}

// ── SCHEDULE
function rSch(){
  var today=tday(),td=DB[today]||{};
  return [{l:"🌅 Morning",items:SCH.morning},{l:"🍛 Day Food",items:SCH.day},{l:"🌙 Night Study",items:SCH.night}].map(function(sec){
    var cnt=sec.items.filter(function(i){return td[i.id];}).length;
    return "<div class='slbl' style='margin-top:4px'>"+sec.l+" <span style='color:var(--blue)'>"+cnt+"/"+sec.items.length+"</span></div>"+
    sec.items.map(function(it){
      var dn=!!td[it.id];
      return "<div class='ci"+(dn?" done":"")+"' onclick=\"togItem('"+it.id+"')\">"+
        "<div class='cic'>"+(dn?"<span style='color:#fff;font-size:10px'>✓</span>":"")+"</div>"+
        "<span class='cil'>"+it.l+"</span><span class='cit'>"+it.t+"</span></div>";
    }).join("")+"<div style='margin-bottom:6px'></div>";
  }).join("");
}
function togItem(id){var k=tday();if(!DB[k])DB[k]={};DB[k][id]=!DB[k][id];save(DB);if(DB[k][id])toast("✓ Done!");render();}

// ── HABITS
function rHab(){
  var today=tday(),td=DB[today]||{},wd=wdays();
  function streak(id){var s=0,r=[].concat(wd).reverse();for(var i=0;i<r.length;i++){if((DB[r[i]]||{})[id])s++;else break;}return s;}
  return "<div class='slbl'>Today</div><div class='hgrid'>"+
  HBTS.map(function(h){
    var dn=!!td[h.id],s=streak(h.id);
    return "<div class='hcard"+(dn?" done":"")+"' onclick=\"togHab('"+h.id+"')\">"+
      "<div style='font-size:22px;margin-bottom:5px'>"+h.ic+"</div>"+
      "<div style='font-size:11px;font-weight:700;color:var(--txt2)'>"+h.l+"</div>"+
      "<div style='font-size:10px;margin-top:4px;color:"+(dn?"var(--green)":"var(--txt3)")+"'>"+(s>0?"🔥"+s:"—")+"</div>"+
    "</div>";
  }).join("")+
  "</div><div class='slbl'>7-Day View</div><div class='card' style='padding:4px 0'>"+
  HBTS.map(function(h){
    return "<div class='wrow'><div style='width:75px;font-size:10px;color:var(--txt3)'>"+h.ic+" "+h.l+"</div>"+
      "<div style='display:flex;gap:4px;flex:1;justify-content:flex-end'>"+
      wd.map(function(d){
        return "<div><div style='font-size:7px;color:var(--txt3);text-align:center;margin-bottom:2px'>"+dltr(d)+"</div>"+
          "<div class='wd"+((DB[d]||{})[h.id]?" done":"")+"'></div></div>";
      }).join("")+"</div></div>";
  }).join("")+"</div>";
}
function togHab(id){var k=tday();if(!DB[k])DB[k]={};DB[k][id]=!DB[k][id];save(DB);if(DB[k][id])toast("🔥 Streak!");render();}

// ── DSA
function rDSA(){
  var dsa=DB._dsa||{solved:[],custom:[]},solved=dsa.solved||[],custom=dsa.custom||[];
  var all=DSA_T.concat(custom),pct=Math.min(100,Math.round(solved.length/100*100));

  return "<div class='slbl'>Sunday Reset</div>"+
  [{k:"wins",l:"🏆 3 Wins",p:"Teen achhi cheezein..."},{k:"mistake",l:"❌ 1 Mistake",p:"Kya galat hua..."},{k:"improvement",l:"📈 1 Improvement",p:"Kya different karunga..."}].map(function(f){
    return "<div style='margin-bottom:12px'><div style='font-size:12px;font-weight:700;color:var(--txt2);margin-bottom:6px'>"+f.l+"</div>"+
      "<textarea class='inp' placeholder='"+f.p+"' onchange=\"svMindW('"+wk+"','"+f.k+"',this.value)\">"+escH(wd[f.k]||"")+"</textarea></div>";
  }).join("")+
  "<div class='cardd' style='font-size:13px;color:var(--txt3);text-align:center;padding:16px'>Motivation fluctuate karta hai.<br><span style='font-weight:800;color:var(--txt)'>System stable rakhta hai. 🔒</span></div>";
}
function rMindR(){
  return "<div class='slbl'>Non-Negotiable Rules</div>"+
  DRULES.map(function(r,i){
    return "<div class='card' style='display:flex;gap:12px;align-items:center'>"+
      "<div style='width:32px;height:32px;border-radius:10px;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0'>"+(i+1)+"</div>"+
      "<div style='font-size:13px;font-weight:600'>"+r+"</div></div>";
  }).join("")+
  "<div class='card' style='border-color:#22c55e33;background:#0d1f0d;margin-top:4px'>"+
  "<div style='font-size:12px;font-weight:700;color:var(--green);margin-bottom:8px'>📈 90 Days Result</div>"+
  "<div style='font-size:12px;color:var(--txt3);line-height:2'>✓ Stable mood · Better sleep<br>✓ Strong routine · Less anxiety<br>✓ <span style='color:var(--green);font-weight:700'>Real growth — visible to everyone</span></div></div>";
}
function togMind(k){var t=tday();if(!DB[t])DB[t]={};DB[t][k]=!DB[t][k];save(DB);render();}
function svMind(k,v){var t=tday();if(!DB[t])DB[t]={};DB[t][k]=v;save(DB);}
function svMindW(wk,k,v){if(!DB[wk])DB[wk]={};DB[wk][k]=v;save(DB);}

// ── BREATHING
var BDUR={inhale:4,hold:4,exhale:6},BNXT={inhale:"hold",hold:"exhale",exhale:"inhale"},BCLR={inhale:"var(--blue)",hold:"var(--amber)",exhale:"var(--purple)"};
function startBr(){if(brTimer)clearTimeout(brTimer);brActive=true;brPhase="inhale";brCount=4;brCyc=0;tickBr();}
function tickBr(){
  var ui=document.getElementById("brui");if(!ui||!brActive)return;
  var dots="";for(var i=0;i<6;i++)dots+="<div style='width:10px;height:10px;border-radius:50%;background:"+(i<brCyc?"var(--purple)":"var(--bg3)")+"'></div>";
  ui.innerHTML="<div style='text-align:center'>"+
    "<div style='font-size:56px;font-weight:800;color:"+BCLR[brPhase]+"'>"+brCount+"</div>"+
    "<div style='font-size:14px;color:var(--txt3);text-transform:capitalize;margin-top:4px;margin-bottom:12px'>"+brPhase+"</div>"+
    "<div style='display:flex;justify-content:center;gap:6px;margin-bottom:14px'>"+dots+"</div>"+
    "<div style='font-size:11px;color:var(--txt3);margin-bottom:12px'>Cycle "+(brCyc+1)+" of 6</div>"+
    "<button class='btn-g' style='border-radius:20px;padding:8px 24px;font-size:12px;background:var(--bg3);color:var(--txt3);border:1px solid var(--border)' onclick='stopBr()'>■ Stop</button></div>";
  if(brCount>1){brCount--;brTimer=setTimeout(tickBr,1000);}
  else{brTimer=setTimeout(function(){
    if(brPhase==="exhale"){brCyc++;if(brCyc>=6){brActive=false;togMind("breathing");toast("🌬️ Complete! ✅","var(--purple)");var u=document.getElementById("brui");if(u)u.innerHTML="<div style='text-align:center'><div style='font-size:13px;color:var(--green);margin-bottom:12px;font-weight:700'>✅ Done!</div><button class='btn-g' style='border-radius:20px;padding:12px 32px' onclick='startBr()'>▶ Again</button></div>";return;}}
    brPhase=BNXT[brPhase];brCount=BDUR[brPhase];tickBr();
  },1000);}
}
function stopBr(){brActive=false;if(brTimer)clearTimeout(brTimer);var u=document.getElementById("brui");if(u)u.innerHTML="<div style='text-align:center'><button class='btn-g' style='border-radius:20px;padding:12px 32px' onclick='startBr()'>▶ Start</button></div>";}

// ── SERVICE WORKER
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').then(function(){
    console.log('SW registered');
  }).catch(function(e){console.log('SW failed:',e);});
}

// ── INIT
render();
if("Notification" in window && Notification.permission==="granted") schedNotifs();
setInterval(function(){save(DB);},30000);
var _n=new Date(),_ms=(new Date(_n.getFullYear(),_n.getMonth(),_n.getDate()+1)-_n);
setTimeout(function(){schedNotifs();setInterval(schedNotifs,86400000);},_ms);
</script>
</body>
