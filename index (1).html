<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0a0a0f"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Personal Growth</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0a0f;--bg2:#111118;--bg3:#18181f;--bd:#1e1e2a;--tx:#e8e8f0;--t2:#888;--t3:#444;--bl:#4f8eff;--pu:#8b5cf6;--gr:#22c55e;--am:#f59e0b;--rd:#ef4444;--gd:linear-gradient(135deg,#4f8eff,#8b5cf6)}
html,body{height:100%;background:var(--bg);overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--tx)}
#app{display:flex;flex-direction:column;height:100vh;width:100%;max-width:430px;margin:0 auto}
.hdr{background:var(--bg);padding:44px 16px 10px;border-bottom:1px solid var(--bd);flex-shrink:0}
.hdr-r{display:flex;justify-content:space-between;align-items:center}
.hd{font-size:9px;letter-spacing:3px;color:var(--bl);text-transform:uppercase;margin-bottom:2px}
.ht{font-size:20px;font-weight:800}
.gx{background:var(--gd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hs{font-size:10px;color:var(--t3);margin-top:1px}
.nb{width:36px;height:36px;border-radius:12px;background:var(--bg3);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}
.pw{margin-top:8px}
.pr{display:flex;justify-content:space-between;font-size:9px;color:var(--t3);margin-bottom:3px}
.pt{height:2px;background:var(--bg3);border-radius:2px;overflow:hidden}
.pf{height:100%;background:var(--gd);border-radius:2px;transition:width .4s}
.scr{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch}
.scr::-webkit-scrollbar{display:none}
.nav{background:var(--bg2);border-top:1px solid var(--bd);display:flex;overflow-x:auto;padding:4px 2px 8px;flex-shrink:0;gap:2px}
.nav::-webkit-scrollbar{display:none}
.nb2{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 9px;border:none;background:none;border-radius:8px;cursor:pointer;min-width:48px}
.nb2 .ic{font-size:18px;line-height:1}
.nb2 .lb{font-size:8px;font-weight:600;color:var(--t3);letter-spacing:.5px;text-transform:uppercase}
.nb2.on{background:var(--bg3)}
.nb2.on .lb{color:var(--bl)}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:14px;margin-bottom:10px}
.lbl{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--t3);text-transform:uppercase;margin-bottom:10px}
.inp{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--bd);border-radius:10px;font-size:13px;color:var(--tx);outline:none;font-family:inherit}
.inp:focus{border-color:var(--bl)}
.inp::placeholder{color:var(--t3)}
textarea.inp{resize:none;min-height:68px;line-height:1.5}
.btn{background:var(--gd);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.pill{padding:6px 13px;border-radius:18px;border:1px solid var(--bd);background:var(--bg);color:var(--t3);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;flex-shrink:0}
.pill.on{background:#4f8eff22;border-color:var(--bl);color:var(--bl)}
.ci{display:flex;align-items:center;gap:12px;padding:11px 13px;background:var(--bg2);border:1px solid var(--bd);border-radius:12px;margin-bottom:6px;cursor:pointer}
.ci.dn{background:#0d1f0d;border-color:#1a3a1a}
.ci.dn .ct{text-decoration:line-through;color:var(--t3)}
.cb{width:20px;height:20px;border-radius:7px;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.ci.dn .cb{background:var(--gr);border-color:var(--gr)}
.ct{flex:1;font-size:13px;font-weight:500}
.tm{font-size:9px;color:var(--t3)}
.hg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.hc{background:var(--bg2);border:1px solid var(--bd);border-radius:13px;padding:13px 8px;text-align:center;cursor:pointer;transition:all .15s}
.hc.dn{background:#0a1f0a;border-color:#22c55e55}
.chip{display:inline-flex;padding:5px 11px;border-radius:18px;font-size:11px;font-weight:600;border:1px solid var(--bd);background:var(--bg);color:var(--t3);cursor:pointer;margin:2px;transition:all .15s}
.chip.dn{background:#4f8eff22;border-color:var(--bl);color:var(--bl)}
.gb{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.gf{height:100%;background:var(--gd);border-radius:2px;transition:width .3s}
.gbtn{width:30px;height:30px;border-radius:50%;background:var(--bg3);border:1px solid var(--bd);color:var(--t2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.sb{flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:11px;padding:11px 7px;text-align:center}
.er{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--bg2);border:1px solid var(--bd);border-radius:12px;margin-bottom:6px}
.vr{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--bg2);border:1px solid var(--bd);border-radius:12px;margin-bottom:6px}
.vn{width:24px;height:24px;border-radius:7px;background:var(--gd);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.wr{display:flex;align-items:center;padding:7px 13px;border-bottom:1px solid var(--bd)}
.wr:last-child{border-bottom:none}
.wd{width:17px;height:17px;border-radius:5px;background:var(--bg3)}
.wd.dn{background:var(--gr)}
.mc{flex:1;background:var(--bg);border:1px solid var(--bd);border-radius:11px;padding:9px;text-align:center;cursor:pointer}
.mc.dn{border-color:var(--pu)}
.rd{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.pc{background:var(--bg2);border:1px solid var(--bd);border-radius:13px;padding:13px;margin-bottom:8px;cursor:pointer}
.pc.ac{border-color:var(--bl)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--gr);color:#fff;padding:9px 18px;border-radius:18px;font-size:12px;font-weight:700;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.ovl{position:fixed;top:0;left:0;right:0;bottom:0;background:#000c;z-index:100;display:none;align-items:flex-end;justify-content:center}
.ovl.show{display:flex}
.sht{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:430px;border-top:1px solid var(--bd);max-height:80vh;overflow-y:auto}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-r">
      <div>
        <div class="hd" id="hd"></div>
        <div class="ht"><span class="gx">Personal</span> Growth</div>
        <div class="hs" id="hs">90-Day Mission</div>
      </div>
      <div class="nb" onclick="openNP()">🔔</div>
    </div>
    <div class="pw">
      <div class="pr"><span>Today</span><span id="pct">0%</span></div>
      <div class="pt"><div class="pf" id="pf" style="width:0"></div></div>
    </div>
  </div>
  <div class="scr" id="scr"></div>
  <div class="nav" id="nav"></div>
</div>
<div class="ovl" id="novl" onclick="if(event.target===this)closeNP()">
  <div class="sht" id="nsht"></div>
</div>
<div class="toast" id="toast"></div>
<script>
var K="pgv5";
function ld(){try{return JSON.parse(localStorage.getItem(K)||"{}");}catch(e){return{};}}
function sv(d){try{localStorage.setItem(K,JSON.stringify(d));}catch(e){}return d;}
var DB=ld();
var sndOn=DB._snd!==false;

function td(){return new Date().toISOString().split("T")[0];}
function mk(){var d=new Date();return d.getFullYear()+"-"+d.getMonth();}
function wk(){return mk();}
function wd7(){var a=[],t=new Date();for(var i=6;i>=0;i--){var d=new Date(t);d.setDate(t.getDate()-i);a.push(d.toISOString().split("T")[0]);}return a;}
function dl(ds){return["Su","Mo","Tu","We","Th","Fr","Sa"][new Date(ds+"T12:00:00").getDay()];}
function fR(n){return"₹"+Number(n||0).toLocaleString("en-IN");}
function eH(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function showToast(m,c){var e=document.getElementById("toast");e.textContent=m;e.style.background=c||"var(--gr)";e.classList.add("show");setTimeout(function(){e.classList.remove("show");},2200);}

// SOUND
var AC=null;
function getAC(){if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}return AC;}
function beep(type){
  if(!sndOn)return;
  try{
    var c=getAC();if(!c)return;
    if(type==="done"){
      [[523,0],[659,.1],[784,.2]].forEach(function(x){
        var o=c.createOscillator(),g=c.createGain();
        o.connect(g);g.connect(c.destination);
        o.frequency.value=x[0];
        g.gain.setValueAtTime(.25,c.currentTime+x[1]);
        g.gain.exponentialRampToValueAtTime(.001,c.currentTime+x[1]+.3);
        o.start(c.currentTime+x[1]);o.stop(c.currentTime+x[1]+.35);
      });
    } else if(type==="habit"){
      var o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);
      o.frequency.setValueAtTime(440,c.currentTime);
      o.frequency.setValueAtTime(880,c.currentTime+.12);
      g.gain.setValueAtTime(.3,c.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.4);
      o.start(c.currentTime);o.stop(c.currentTime+.4);
    } else if(type==="alert"){
      var o=c.createOscillator(),g=c.createGain();
      o.type="square";o.connect(g);g.connect(c.destination);
      o.frequency.value=700;
      g.gain.setValueAtTime(.15,c.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.25);
      o.start(c.currentTime);o.stop(c.currentTime+.25);
    } else if(type==="win"){
      [523,659,784,1047].forEach(function(f,i){
        var o=c.createOscillator(),g=c.createGain();
        o.connect(g);g.connect(c.destination);
        o.frequency.value=f;
        g.gain.setValueAtTime(.2,c.currentTime+i*.1);
        g.gain.exponentialRampToValueAtTime(.001,c.currentTime+i*.1+.3);
        o.start(c.currentTime+i*.1);o.stop(c.currentTime+i*.1+.35);
      });
    }
  }catch(e){}
}

// NOTIFICATIONS
function askNotif(){
  if(!("Notification" in window)){showToast("Browser support nahi","var(--rd)");return;}
  Notification.requestPermission().then(function(p){
    if(p==="granted"){beep("win");schedAll();showToast("🔔 Notifications ON!");}
    else showToast("Permission deny hua","var(--rd)");
    renderNP();
  });
}
function sendN(t,b,snd){
  if("Notification" in window&&Notification.permission==="granted")
    new Notification(t,{body:b,icon:"/icon.png"});
  if(snd)beep(snd);
}
var NSCH=[
  {time:"06:15",title:"🌅 Rise & Shine!",body:"Wake up! Water pi. Gym ready ho!",snd:"win"},
  {time:"06:30",title:"💪 Gym Time!",body:"6:30 ho gaya — gym chalte hain!",snd:"habit"},
  {time:"08:45",title:"🏢 Job ke liye niklo!",body:"Office time. Abhi niklo.",snd:"alert"},
  {time:"11:00",title:"🥜 Snack Time!",body:"Fruit + Peanuts. Energy rakho.",snd:"alert"},
  {time:"13:00",title:"🍛 Lunch!",body:"Lunch karo bhai.",snd:"alert"},
  {time:"21:30",title:"💻 DSA Time!",body:"9:30 PM — 45 min DSA practice.",snd:"alert"},
  {time:"22:25",title:"🛠️ Dev Time!",body:"Project pe focus. 40 min.",snd:"alert"},
  {time:"23:05",title:"✅ Recap + GitHub!",body:"Push karo. Review. 10 min.",snd:"alert"},
  {time:"23:15",title:"📵 Phone band karo!",body:"11:15 — phone rakh do bhai.",snd:"alert"},
  {time:"23:30",title:"😴 So jao!",body:"Rest zaroori hai. 90-day mission.",snd:"win"}
];
function schedAll(){
  if(!("Notification" in window)||Notification.permission!=="granted")return;
  var now=new Date();
  NSCH.forEach(function(n){
    var p=n.time.split(":");
    var t=new Date();t.setHours(+p[0],+p[1],0,0);
    if(t<=now)t.setDate(t.getDate()+1);
    var d=t-now;
    if(d>0&&d<86400000)setTimeout(function(a,b,c){sendN(a,b,c);}.bind(null,n.title,n.body,n.snd),d);
  });
}

// DATA
var SCH={
  m:[{id:"wake",t:"6:15",l:"Wake up + Water + Freshen up"},{id:"gym",t:"6:30–7:30",l:"Gym 💪"},{id:"sun",t:"7:30–7:40",l:"Sunlight ☀️"},{id:"whey",t:"7:45",l:"Whey + Banana 🍌"},{id:"bfast",t:"8:15",l:"Breakfast 🍳"},{id:"leave",t:"8:45",l:"Leave for Job 🏢"}],
  d:[{id:"fruit",t:"11:00",l:"Fruit + Peanuts 🥜"},{id:"lunch",t:"1:00 PM",l:"Lunch 🍛"},{id:"snack",t:"5:30 PM",l:"Evening Snack"}],
  n:[{id:"dinner",t:"9:00–9:30",l:"Dinner + Family 🏠"},{id:"dsa",t:"9:30–10:15",l:"DSA Practice 💻"},{id:"brk",t:"10:15–10:25",l:"Break ☕"},{id:"dev",t:"10:25–11:05",l:"Dev / Project 🛠️"},{id:"recap",t:"11:05–11:15",l:"Recap + GitHub ✅"},{id:"slp",t:"11:30 PM",l:"Sleep 😴"}]
};
var HBTS=[{id:"gym_h",l:"Gym",ic:"🏋️"},{id:"slp_h",l:"Sleep",ic:"😴"},{id:"dsa_h",l:"DSA",ic:"🧠"},{id:"dev_h",l:"Dev",ic:"💻"},{id:"git_h",l:"GitHub",ic:"🐙"},{id:"wtr_h",l:"Water",ic:"💧"}];
var DSAT=["Arrays","Strings","Linked List","Stack","Queue","Binary Search","Recursion","Sorting","Hashing","Trees","BST","Graphs","DP","Greedy","Backtracking"];
var TABS=[{id:"S",ic:"📅",l:"Sched"},{id:"H",ic:"🔥",l:"Habits"},{id:"D",ic:"🧠",l:"DSA"},{id:"G",ic:"🎯",l:"Goals"},{id:"W",ic:"📊",l:"Weekly"},{id:"F",ic:"💰",l:"Finance"},{id:"HM",ic:"🏠",l:"Home"},{id:"C",ic:"🎥",l:"Content"},{id:"M",ic:"🧘",l:"Mind"}];
var PHASES=[
  {p:"Phase 1",y:"2026",c:"var(--gr)",l:"Foundation",g:["Emergency ₹1.5L","Expense control","Income grow"],n:"Pehle neev."},
  {p:"Phase 2",y:"2027",c:"var(--am)",l:"Income Growth",g:["Salary 40–50K","EMI check","₹10K+/mo saving"],n:"Ghar layak banna."},
  {p:"Phase 3",y:"2028–29",c:"var(--pu)",l:"Action Year",g:["Down payment ₹5–8L","EMI < 30%","Fund untouched"],n:"Tab ghar realistic. ✅"}
];
var NICHES=["Coding Journey (DSA + Build in Public)","Self Improvement for Working Guys","Finance + Responsibility Mindset"];
var RULES=["Phone 11:15 PM ke baad band 📵","No random spending 💸","No skip gym 2 days 🏋️","Sunday review mandatory 📅"];

var aT="S",fS="O",cS="O",mS="D";
var brOn=false,brPh="inhale",brCnt=4,brCyc=0,brTmr=null;
var BDUR={inhale:4,hold:4,exhale:6},BNXT={inhale:"hold",hold:"exhale",exhale:"inhale"},BCLR={inhale:"var(--bl)",hold:"var(--am)",exhale:"var(--pu)"};

function dayN(){if(!DB._st){DB._st=td();sv(DB);}return Math.min(90,Math.max(1,Math.floor((new Date()-new Date(DB._st))/86400000)+1));}

function render(){
  DB=ld();
  var t=td(),day=DB[t]||{};
  var all=[].concat(SCH.m,SCH.d,SCH.n);
  var done=all.filter(function(i){return day[i.id];}).length;
  var pct=Math.round(done/all.length*100);
  document.getElementById("hd").textContent=new Date().toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"short"}).toUpperCase();
  document.getElementById("pct").textContent=pct+"%";
  document.getElementById("pf").style.width=pct+"%";
  document.getElementById("hs").textContent=pct===100?"🏆 Complete!":"Day "+dayN()+" of 90 · "+pct+"%";
  document.getElementById("nav").innerHTML=TABS.map(function(x){
    return "<button class='nb2"+(x.id===aT?" on":"")+"' onclick=\"sw('"+x.id+"')\"><span class='ic'>"+x.ic+"</span><span class='lb'>"+x.l+"</span></button>";
  }).join("");
  var h="";
  if(aT==="S")h=rS();
  else if(aT==="H")h=rH();
  else if(aT==="D")h=rDSA();
  else if(aT==="G")h=rG();
  else if(aT==="W")h=rW();
  else if(aT==="F")h=rF();
  else if(aT==="HM")h=rHM();
  else if(aT==="C")h=rC();
  else if(aT==="M")h=rMind();
  document.getElementById("scr").innerHTML=h;
}
function sw(t){aT=t;fS="O";cS="O";mS="D";render();}
function sF(s){fS=s;render();}function sC(s){cS=s;render();}function sM(s){mS=s;render();}

// SCHEDULE
function rS(){
  var t=td(),day=DB[t]||{};
  return [{l:"🌅 Morning",it:SCH.m},{l:"🍛 Day Food",it:SCH.d},{l:"🌙 Night",it:SCH.n}].map(function(sec){
    var c=sec.it.filter(function(i){return day[i.id];}).length;
    return "<div class='lbl' style='margin-top:4px'>"+sec.l+" <span style='color:var(--bl)'>"+c+"/"+sec.it.length+"</span></div>"+
    sec.it.map(function(it){
      var dn=!!day[it.id];
      return "<div class='ci"+(dn?" dn":"")+"' onclick=\"tI('"+it.id+"')\">"+
        "<div class='cb'>"+(dn?"<span style='color:#fff;font-size:10px'>✓</span>":"")+"</div>"+
        "<span class='ct'>"+it.l+"</span><span class='tm'>"+it.t+"</span></div>";
    }).join("")+"<div style='margin-bottom:4px'></div>";
  }).join("");
}
function tI(id){
  var k=td();if(!DB[k])DB[k]={};DB[k][id]=!DB[k][id];sv(DB);
  if(DB[k][id]){showToast("✓ Done!");beep("done");chkDay();}
  render();
}
function chkDay(){
  var k=td(),day=DB[k]||{};
  var all=[].concat(SCH.m,SCH.d,SCH.n);
  var done=all.filter(function(i){return day[i.id];}).length;
  if(done===all.length){
    setTimeout(function(){sendN("🏆 Aaj ka din Complete!","Sabhi "+all.length+" tasks done! Champion!","win");showToast("🏆 Din Complete! Champion!","var(--pu)");},300);
  } else if(done>0&&done%5===0){
    sendN("💪 "+done+" tasks done!","Aur "+(all.length-done)+" baaki — keep going!","done");
  }
}

// HABITS
function rH(){
  var t=td(),day=DB[t]||{},days=wd7();
  function strk(id){var s=0,r=[].concat(days).reverse();for(var i=0;i<r.length;i++){if((DB[r[i]]||{})[id])s++;else break;}return s;}
  return "<div class='lbl'>Today</div><div class='hg'>"+
  HBTS.map(function(h){
    var dn=!!day[h.id],s=strk(h.id);
    return "<div class='hc"+(dn?" dn":"")+"' onclick=\"tH('"+h.id+"')\">"+
      "<div style='font-size:22px;margin-bottom:5px'>"+h.ic+"</div>"+
      "<div style='font-size:11px;font-weight:700;color:var(--t2)'>"+h.l+"</div>"+
      "<div style='font-size:10px;margin-top:3px;color:"+(dn?"var(--gr)":"var(--t3)")+"'>"+(s>0?"🔥"+s:"—")+"</div></div>";
  }).join("")+
  "</div><div class='lbl'>7-Day</div><div class='card' style='padding:4px 0'>"+
  HBTS.map(function(h){
    return "<div class='wr'><div style='width:70px;font-size:9px;color:var(--t3)'>"+h.ic+" "+h.l+"</div>"+
      "<div style='display:flex;gap:4px;flex:1;justify-content:flex-end'>"+
      days.map(function(d){
        return "<div><div style='font-size:7px;color:var(--t3);text-align:center;margin-bottom:2px'>"+dl(d)+"</div>"+
          "<div class='wd"+((DB[d]||{})[h.id]?" dn":"")+"'></div></div>";
      }).join("")+"</div></div>";
  }).join("")+"</div>";
}
function tH(id){var k=td();if(!DB[k])DB[k]={};DB[k][id]=!DB[k][id];sv(DB);if(DB[k][id]){showToast("🔥 Streak!");beep("habit");}render();}

// DSA
function rDSA(){
  var dsa=DB._dsa||{solved:[],custom:[]},sol=dsa.solved||[],cus=dsa.custom||[];
  var all=DSAT.concat(cus),pct=Math.min(100,Math.round(sol.length/100*100));
  var ci=2*Math.PI*28;
  return "<div class='card' style='display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;border-color:#4f8eff44'>"+
    "<div><div class='lbl' style='margin-bottom:4px'>Solved</div>"+
    "<div style='font-size:44px;font-weight:800;background:var(--gd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1'>"+sol.length+"</div>"+
